name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_test:

    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout the repository
      run: |
        git clone ${{ github.event.repository.clone_url }}
        cd ${{ github.event.repository.name }}

    - name: Install dependencies
      run: npm install
      
    - name: Run integration tests
      run: npm test
